name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      # auth-worker is intentionally outside the pnpm workspace (different
      # runtime), so it needs its own install + typecheck step.
      - name: Install auth-worker deps
        working-directory: auth-worker
        run: npm ci
      - name: Typecheck auth-worker
        working-directory: auth-worker
        run: npm run typecheck
